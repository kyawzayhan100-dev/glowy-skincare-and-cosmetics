{% extends 'layout.html' %}
{% block content %}
<h1>Add New Product</h1>
<form action="{{ url_for('add_product') }}" method="post" class="add-product-form">
    <label for="name">Product Name</label>
    <input id="name" name="name" type="text" required />

    <label for="category">Category</label>
    <input id="category" name="category" type="text" placeholder="Skincare or Cosmetics" />

    <label for="price">Price</label>
    <input id="price" name="price" type="number" min="0.01" step="0.01" required />

    <label for="description">Description</label>
    <textarea id="description" name="description" rows="4" required></textarea>

    <button type="submit" class="button">Add Product</button>
</form>
{% endblock %}

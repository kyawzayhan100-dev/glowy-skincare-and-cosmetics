<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glowy Skincare and Cosmetics</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a class="brand" href="{{ url_for('home') }}">Glowy Skincare and Cosmetics</a>
            <nav>
                <a href="{{ url_for('home') }}">Shop</a>
                <a href="{{ url_for('cart') }}">Cart</a>
                <a href="{{ url_for('admin_products') }}">Admin</a>
            </nav>
        </div>
    </header>
    <main class="container">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-messages">
                    {% for message in messages %}
                        <div class="flash">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
        <div class="container">
            <p>Glowy Skincare and Cosmetics &copy; 2026</p>
        </div>
    </footer>
</body>
</html>

{% extends 'layout.html' %}
{% block content %}
<h1>Checkout</h1>
<form action="{{ url_for('checkout') }}" method="post" class="checkout-form">
    <section class="checkout-panel checkout-details">
        <div>
            <h2>Delivery Information</h2>
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required />

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required />

            <label for="phone">Phone</label>
            <input type="text" id="phone" name="phone" placeholder="e.g. +1 555 123 4567" required />

            <label for="address">Delivery Address</label>
            <textarea id="address" name="address" rows="4" required></textarea>

            <label for="city">City</label>
            <input type="text" id="city" name="city" required />

            <label for="postal_code">Postal Code</label>
            <input type="text" id="postal_code" name="postal_code" required />
        </div>
        <div>
            <h2>Order Summary</h2>
            <div class="order-summary-panel">
                {% for item in items %}
                <div class="order-item">
                    <span>{{ item.quantity }} × {{ item.product['name'] }}</span>
                    <span>${{ '%.2f'|format(item.subtotal) }}</span>
                </div>
                {% endfor %}
            </div>
            <div class="order-total">
                <span>Total</span>
                <strong>${{ '%.2f'|format(total) }}</strong>
            </div>
            <button type="submit" class="button">Confirm Order</button>
        </div>
    </section>
</form>
{% endblock %}

{% extends 'layout.html' %}
{% block content %}
<h1>Checkout</h1>
<form action="{{ url_for('checkout') }}" method="post" class="checkout-form">
    <div class="checkout-section">
        <h2>Customer Information</h2>
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required />

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />

        <label for="phone">Phone</label>
        <input type="text" id="phone" name="phone" placeholder="e.g. +1 555 123 4567" required />

        <label for="address">Delivery Address</label>
        <textarea id="address" name="address" rows="4" required></textarea>

        <label for="city">City</label>
        <input type="text" id="city" name="city" required />

        <label for="postal_code">Postal Code</label>
        <input type="text" id="postal_code" name="postal_code" required />
    </div>
    <div class="checkout-section">
        <h2>Order Summary</h2>
        <ul class="order-summary">
            {% for item in items %}
            <li>{{ item.quantity }} × {{ item.product['name'] }} — ${{ '%.2f'|format(item.subtotal) }}</li>
            {% endfor %}
        </ul>
        <p class="cart-total">Total: ${{ '%.2f'|format(total) }}</p>
    </div>
    <button type="submit" class="button">Place Order</button>
</form>
{% endblock %}

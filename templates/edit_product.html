{% extends 'layout.html' %}
{% block content %}
<h1>Edit Product</h1>
<form action="{{ url_for('edit_product', product_id=product['id']) }}" method="post" enctype="multipart/form-data" class="add-product-form">
    <label for="name">Product Name</label>
    <input id="name" name="name" type="text" value="{{ product['name'] }}" required />

    <label for="category">Category</label>
    <input id="category" name="category" type="text" value="{{ product['category'] }}" placeholder="Skincare or Cosmetics" />

    <label for="price">Price</label>
    <input id="price" name="price" type="number" min="0.01" step="0.01" value="{{ '%.2f'|format(product['price']) }}" required />

    <label for="description">Description</label>
    <textarea id="description" name="description" rows="4" required>{{ product['description'] }}</textarea>

    <label for="image">Product Image</label>
    <input id="image" name="image" type="file" accept="image/*" />
    {% if product['image'] %}
    <p>Current image: {{ product['image'] }}</p>
    {% endif %}

    <button type="submit" class="button">Save Changes</button>
</form>
{% endblock %}
